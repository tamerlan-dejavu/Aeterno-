<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cipher Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0f172a;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(34, 197, 94, 0.08) 0%, transparent 40%);
            min-height: 100vh;
        }
        .neon-title {
            color: #67e8f9;
            text-shadow:
                0 0 5px #22d3ee,
                0 0 10px #22d3ee,
                0 0 20px #22d3ee,
                0 0 40px #0891b2;
        }
        .neon-border {
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.1) inset;
        }
        .neon-input {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(34, 211, 238, 0.4);
            color: #e0f2fe;
            transition: all 0.2s ease;
        }
        .neon-input:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.3), 0 0 15px rgba(34, 211, 238, 0.4);
        }
        .btn-neon {
            transition: all 0.25s ease;
            position: relative;
            font-weight: 600;
        }
        .btn-cyan {
            background: linear-gradient(135deg, #0e7490, #06b6d4);
            color: #ecfeff;
            border: 1px solid #22d3ee;
        }
        .btn-cyan:hover:not(:disabled) {
            box-shadow: 0 0 10px #22d3ee, 0 0 25px #22d3ee, 0 0 40px rgba(34, 211, 238, 0.5);
            transform: translateY(-1px);
        }
        .btn-green {
            background: linear-gradient(135deg, #15803d, #22c55e);
            color: #f0fdf4;
            border: 1px solid #4ade80;
        }
        .btn-green:hover:not(:disabled) {
            box-shadow: 0 0 10px #4ade80, 0 0 25px #4ade80, 0 0 40px rgba(74, 222, 128, 0.5);
            transform: translateY(-1px);
        }
        .btn-slate {
            background: rgba(30, 41, 59, 0.8);
            color: #cbd5e1;
            border: 1px solid rgba(100, 116, 139, 0.5);
        }
        .btn-slate:hover:not(:disabled) {
            border-color: #22d3ee;
            color: #67e8f9;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-success {
            color: #4ade80;
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
        }
        .status-error {
            color: #f87171;
            text-shadow: 0 0 8px rgba(248, 113, 113, 0.6);
        }
        textarea, input { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #22d3ee; }
    </style>
</head>
<body class="text-slate-200">

<div class="max-w-5xl mx-auto p-6">

    <header class="text-center mb-8 mt-4">
        <h1 class="neon-title text-4xl md:text-5xl font-extrabold tracking-wider">
            Custom Cipher Tool
        </h1>
        <p class="text-slate-400 mt-2 text-sm">XOR + Circular Bit Shift &middot; symmetric encryption</p>
    </header>

    <main class="bg-slate-900/50 backdrop-blur rounded-xl neon-border p-6 space-y-5">

        <div>
            <label for="inputText" class="block text-cyan-300 mb-2 text-sm font-semibold">
                Input Text
            </label>
            <textarea id="inputText" rows="6"
                      placeholder="Enter plaintext to encrypt or paste Base64 ciphertext to decrypt..."
                      class="neon-input w-full p-3 rounded-lg resize-vertical"></textarea>
            <div class="text-right text-xs text-slate-500 mt-1">
                <span id="charCount">0</span> characters
            </div>
        </div>

        <div>
            <label for="secretKey" class="block text-cyan-300 mb-2 text-sm font-semibold">
                Secret Key
            </label>
            <input id="secretKey" type="text"
                   placeholder="Enter your secret key (any UTF-8 string)"
                   class="neon-input w-full p-3 rounded-lg">
        </div>

        <div class="flex flex-wrap gap-3">
            <button id="encryptBtn" class="btn-neon btn-cyan px-5 py-2.5 rounded-lg flex-1 min-w-[140px]">
                🔒 Encrypt
            </button>
            <button id="decryptBtn" class="btn-neon btn-green px-5 py-2.5 rounded-lg flex-1 min-w-[140px]">
                🔓 Decrypt
            </button>
        </div>

        <div class="flex flex-wrap gap-3">
            <label class="btn-neon btn-slate px-4 py-2 rounded-lg cursor-pointer text-sm flex-1 min-w-[140px] text-center">
                ⬆ Load File
                <input type="file" id="fileInput" accept=".txt" class="hidden">
            </label>
            <button id="saveBtn" class="btn-neon btn-slate px-4 py-2 rounded-lg text-sm flex-1 min-w-[140px]">
                ⬇ Save Output
            </button>
            <button id="copyBtn" class="btn-neon btn-slate px-4 py-2 rounded-lg text-sm flex-1 min-w-[140px]">
                📋 Copy to Clipboard
            </button>
        </div>

        <div>
            <label for="outputText" class="block text-cyan-300 mb-2 text-sm font-semibold">
                Output
            </label>
            <textarea id="outputText" rows="6" readonly
                      placeholder="Result will appear here..."
                      class="neon-input w-full p-3 rounded-lg resize-vertical"></textarea>
        </div>

        <div id="statusBar" class="text-center text-sm py-2 px-4 rounded-lg bg-slate-800/50 border border-slate-700">
            <span class="text-slate-500">Ready.</span>
        </div>

    </main>

    <footer class="text-center text-slate-600 text-xs mt-6">
        Custom XOR-Shift Cipher &middot; educational use only
    </footer>
</div>

<script>
    // Backend URL - update this with your deployed backend URL
    const API_BASE = 'https://custom-cipher-backend.onrender.com';

    const inputText  = document.getElementById('inputText');
    const secretKey  = document.getElementById('secretKey');
    const outputText = document.getElementById('outputText');
    const charCount  = document.getElementById('charCount');
    const statusBar  = document.getElementById('statusBar');

    const encryptBtn = document.getElementById('encryptBtn');
    const decryptBtn = document.getElementById('decryptBtn');
    const copyBtn    = document.getElementById('copyBtn');
    const saveBtn    = document.getElementById('saveBtn');
    const fileInput  = document.getElementById('fileInput');

    inputText.addEventListener('input', () => {
        charCount.textContent = inputText.value.length;
    });

    function setStatus(message, ok) {
        statusBar.innerHTML = '';
        const span = document.createElement('span');
        span.textContent = message;
        span.className = ok ? 'status-success' : 'status-error';
        statusBar.appendChild(span);
        statusBar.className = 'text-center text-sm py-2 px-4 rounded-lg ' +
            (ok ? 'bg-green-900/20 border border-green-700/50'
                : 'bg-red-900/20 border border-red-700/50');
    }

    function setLoading(btn, loading, originalText) {
        if (loading) {
            btn.dataset.original = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Working...';
        } else {
            btn.disabled = false;
            btn.innerHTML = btn.dataset.original || originalText;
        }
        encryptBtn.disabled = loading;
        decryptBtn.disabled = loading;
    }

    async function callApi(endpoint, btn) {
        const text = inputText.value;
        const key  = secretKey.value;

        if (!key) {
            setStatus('Secret key is required.', false);
            return;
        }

        setLoading(btn, true);
        try {
            const res = await fetch(`${API_BASE}/api/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, key })
            });
            const data = await res.json();
            if (data.success) {
                outputText.value = data.result;
                setStatus(data.message || 'Success', true);
            } else {
                outputText.value = '';
                setStatus(data.message || 'Operation failed.', false);
            }
        } catch (err) {
            outputText.value = '';
            setStatus('Network error: ' + err.message, false);
        } finally {
            setLoading(btn, false);
        }
    }

    encryptBtn.addEventListener('click', () => callApi('encrypt', encryptBtn));
    decryptBtn.addEventListener('click', () => callApi('decrypt', decryptBtn));

    copyBtn.addEventListener('click', async () => {
        if (!outputText.value) {
            setStatus('Nothing to copy.', false);
            return;
        }
        try {
            await navigator.clipboard.writeText(outputText.value);
            setStatus('Copied to clipboard.', true);
        } catch (e) {
            outputText.select();
            document.execCommand('copy');
            setStatus('Copied (fallback).', true);
        }
    });

    saveBtn.addEventListener('click', () => {
        if (!outputText.value) {
            setStatus('Nothing to save.', false);
            return;
        }
        const blob = new Blob([outputText.value], { type: 'text/plain;charset=utf-8' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url;
        a.download = 'cipher-output.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setStatus('Output saved.', true);
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            inputText.value = ev.target.result;
            charCount.textContent = inputText.value.length;
            setStatus(`Loaded ${file.name}`, true);
        };
        reader.onerror = () => setStatus('Failed to read file.', false);
        reader.readAsText(file);
        fileInput.value = '';
    });
</script>
</body>
</html>
